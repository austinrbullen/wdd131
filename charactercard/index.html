<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Swamp Beast Hero Card</title>
    <meta name="description" content="A JavaScript character card for WDD 131.">

    <meta property="og:title" content="Swamp Beast Hero">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/snortleblat.webp">
    <meta property="og:description" content="A fantasy character card using JavaScript objects and methods.">

    <link rel="stylesheet" href="style.css">
    <script src="character.js" defer></script>
</head>
<body>
    <main>
        <section class="card">
            <img id="characterImage" src="images/snortleblat.webp" alt="Swamp Beast Hero">

            <div class="card-content">
                <h1 id="characterName"></h1>
                <p><strong>Class:</strong> <span id="characterClass"></span></p>
                <p><strong>Level:</strong> <span id="characterLevel"></span></p>
                <p><strong>Health:</strong> <span id="characterHealth"></span></p>

                <p id="message"></p>

                <div class="buttons">
                    <button id="attackButton">Attack</button>
                    <button id="levelButton">Level Up</button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
