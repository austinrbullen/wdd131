<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Ticket Form</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="eventform.css" />
  <script src="eventform.js" defer></script>
<link rel="icon" href="byuilogo.png"></head>
<body>
  <main class="wrapper">
    <h1>Event Ticket</h1>

    <form id="eventForm">
      <div class="field">
        <label for="firstName">First Name</label>
        <input id="firstName" name="firstName" type="text" required>
      </div>

      <div class="field">
        <label for="lastName">Last Name</label>
        <input id="lastName" name="lastName" type="text" required>
      </div>

      <div class="field full">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>
      </div>

      <div class="field">
        <label for="eventDate">Event Date</label>
        <input id="eventDate" name="eventDate" type="date" required>
      </div>

      <div class="field">
        <label for="ticketType">Type</label>
        <select id="ticketType" name="ticketType" required>
          <option value="">Choose one</option>
          <option value="student">Student</option>
          <option value="guest">Guest</option>
        </select>
      </div>

      <div id="codeContainer" class="field full" hidden>
        <label id="codeLabel" for="codeInput">Student I#</label>
        <input id="codeInput" name="codeInput" type="text">
      </div>

      <button class="full" type="submit">Create Ticket</button>
    </form>

    <section id="output" aria-live="polite"></section>
  </main>
</body>
</html>
