<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>
    <meta name="description" content="A simple recipe book page featuring an apple crisp recipe.">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="Find simple and delicious recipes like homemade apple crisp.">
    <meta property="og:url" content="https://githubusername.github.io/wdd131/recipes">
    <meta property="og:image" content="images/social-preview-image.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="Find simple and delicious recipes like homemade apple crisp.">
    <meta name="twitter:image" content="images/social-preview-image.png">

    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="logo-title">
            <img src="images/recipe-book.png" alt="Recipe Book logo">
            <h1>Recipe Book</h1>
        </div>
    </header>

    <main>
        <form class="search">
            <label for="search-input" class="visually-hidden">Search recipes</label>
            <input id="search-input" type="text" placeholder="Find a recipe">
            <button type="submit">
                <img src="images/search.svg" alt="Search">
            </button>
        </form>

        <section class="recipe-card">
            <img class="recipe-image" src="images/apple-crisp.jpg" alt="Apple crisp in a bowl">

            <div class="recipe-info">
                <p class="tag">dessert</p>
                <h2>Apple Crisp</h2>

                <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                    <span aria-hidden="true">⭐</span>
                    <span aria-hidden="true">⭐</span>
                    <span aria-hidden="true">⭐</span>
                    <span aria-hidden="true">⭐</span>
                    <span aria-hidden="true">☆</span>
                </span>

                <p class="description">
                    This apple crisp recipe is simple, warm, and perfect for fall. It uses fresh apples, cinnamon,
                    brown sugar, and a crispy oat topping.
                </p>
            </div>
        </section>
    </main>

    <footer>
        <a class="attribution" href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
            Recipe icons created by Freepik - Flaticon
        </a>

        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
            <a href="#"><img src="images/instagram_icon.svg" alt="Instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="YouTube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="Pinterest icon"></a>
        </div>
    </footer>
</body>

</html>
